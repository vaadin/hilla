name: Setup
description: Common setup workflow steps

inputs:
  node-version:
    description: Node.js version
    required: true
    default: 'lts/*'
  java-version:
    description: Java version
    required: true
    default: '17'
  cache-version:
    description: Cache version prefix — increment to bust all stale caches
    required: false
    default: 'v24'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
    - name: Cache Maven repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ inputs.cache-version }}-${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ inputs.cache-version }}-${{ runner.os }}-maven-
    - name: Evict stale Vaadin SNAPSHOTs
      # actions/cache restores the whole ~/.m2 tree, including Vaadin
      # SNAPSHOT jars (flow-server, flow-build-tools, hilla-*, vaadin-*)
      # that drift across nightly Vaadin publishes but that the cache
      # never re-saves once the primary key is hit. Wipe SNAPSHOT
      # directories under com/vaadin/ so Maven/Gradle re-fetch the
      # current SNAPSHOT from vaadin-prereleases on the next resolve.
      # Released versions under com/vaadin/ and the rest of the cache
      # are untouched.
      shell: bash
      run: |
        if [ -d ~/.m2/repository/com/vaadin ]; then
          find ~/.m2/repository/com/vaadin -type d -name '*-SNAPSHOT' -prune -print -exec rm -rf {} +
        fi
    - name: Cache node_modules
      uses: actions/cache@v4
      id: cache-node_modules
      with:
        path: |
          node_modules
          packages/ts/*/node_modules
        key: ${{ inputs.cache-version }}-${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
    - name: Install npm dependencies
      if: ${{ steps.cache-node_modules.outputs.cache-hit != 'true' }}
      shell: bash
      run: npm ci --ignore-scripts
