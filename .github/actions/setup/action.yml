name: Setup
description: Common setup workflow steps

inputs:
  node-version:
    description: Node.js version
    required: true
    default: 'lts/*'
  java-version:
    description: Java version
    required: true
    default: '21'
  cache-version:
    description: Cache version prefix — increment to bust all stale caches
    required: false
    default: 'v1'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
    - name: Cache Maven repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ inputs.cache-version }}-${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ inputs.cache-version }}-${{ runner.os }}-maven-
    - name: Cache node_modules
      uses: actions/cache@v4
      id: cache-node_modules
      with:
        path: |
          node_modules
          packages/ts/*/node_modules
        key: ${{ inputs.cache-version }}-${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
    - name: Install npm dependencies
      if: ${{ steps.cache-node_modules.outputs.cache-hit != 'true' }}
      shell: bash
      run: npm ci --ignore-scripts
